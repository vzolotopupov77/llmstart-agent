services:
  langfuse-db:
    image: postgres:15
    restart: unless-stopped
    networks:
      - langfuse_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 30s
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:?LANGFUSE_POSTGRES_PASSWORD is required in .env}
      POSTGRES_DB: postgres
      TZ: UTC
      PGTZ: UTC
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2.95.11
    restart: unless-stopped
    networks:
      - langfuse_net
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/api/public/health?failIfDatabaseUnavailable=true || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    environment:
      DATABASE_URL: postgresql://postgres:${LANGFUSE_POSTGRES_PASSWORD}@langfuse-db:5432/postgres
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?LANGFUSE_NEXTAUTH_SECRET is required in .env}
      SALT: ${LANGFUSE_SALT:?LANGFUSE_SALT is required in .env}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:?LANGFUSE_ENCRYPTION_KEY is required in .env}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3001}
      TELEMETRY_ENABLED: "false"
      HOSTNAME: "0.0.0.0"

networks:
  langfuse_net:
    driver: bridge

volumes:
  langfuse_postgres_data:
    driver: local
